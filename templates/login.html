<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Dashboard - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Gruvbox Dark Theme */
        :root {
            --bg-body: #282828;
            --bg-card: #3c3836;
            --bg-input: #1d2021;
            --accent: #fe8019;
            --accent-hover: #fabd2f;
            --text-main: #ebdbb2;
            --text-bright: #fbf1c7;
            --text-muted: #a89984;
            --border-color: #504945;
            --status-stopped: #fb4934;
        }
        body { 
            background: var(--bg-body); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 40px 50px;
            box-shadow: 0 10px 40px rgba(254, 128, 25, 0.15);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .login-icon { font-size: 60px; margin-bottom: 20px; }
        h1 { color: var(--accent); margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; }
        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
        }
        .form-control:focus {
            background: var(--bg-input);
            border-color: var(--accent);
            color: var(--text-main);
            box-shadow: 0 0 0 0.2rem rgba(254, 128, 25, 0.25);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .btn-login {
            background: var(--accent);
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 25px;
            color: #1d2021;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        .btn-login:hover { background: var(--accent-hover); color: #1d2021; }
        .alert { 
            background: rgba(251, 73, 52, 0.15); 
            border: 1px solid var(--status-stopped);
            color: var(--status-stopped);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon">🐳</div>
        <h1>Docker Dashboard</h1>
        <p class="subtitle">Log in om toegang te krijgen</p>
        
        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="mb-3">
                <input type="text" class="form-control" name="username" 
                       placeholder="Gebruikersnaam" required autofocus>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" name="password" 
                       placeholder="Wachtwoord" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">
                🔐 Inloggen
            </button>
        </form>
    </div>
</body>
</html>
