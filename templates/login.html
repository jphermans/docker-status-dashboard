<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Dashboard - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #3b82f6;
            --text-main: #1e293b;
            --text-bright: #0f172a;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --border-focus: #2563eb;
            --shadow: rgba(37, 99, 235, 0.15);
            --danger: #dc2626;
            --danger-bg: rgba(220, 38, 38, 0.1);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-light: #2563eb;
            --text-main: #f1f5f9;
            --text-bright: #ffffff;
            --text-muted: #94a3b8;
            --border: #475569;
            --border-focus: #3b82f6;
            --shadow: rgba(59, 130, 246, 0.2);
            --danger: #f87171;
            --danger-bg: rgba(248, 113, 113, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body { 
            background: var(--bg-body); 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .page-wrapper { min-height: 100%; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .login-card {
            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 40px 50px;
            box-shadow: 0 10px 40px var(--shadow);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-icon { font-size: 60px; margin-bottom: 20px; }
        h1 { color: var(--accent); margin-bottom: 10px; font-size: 26px; font-weight: 700; }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 15px; }

        .form-control {
            background: var(--bg-input);
            border: 2px solid var(--border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background: var(--bg-input);
            border-color: var(--border-focus);
            color: var(--text-main);
            box-shadow: 0 0 0 4px var(--shadow);
            outline: none;
        }

        .form-control::placeholder { color: var(--text-muted); }

        .btn-login {
            background: var(--accent);
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            border-radius: 10px;
            color: #ffffff;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover { 
            background: var(--accent-hover); 
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .btn-login:active { transform: translateY(0); }

        .alert { 
            background: var(--danger-bg); 
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .mb-3 { margin-bottom: 1rem; }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: 2px solid var(--border);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .theme-toggle:hover { border-color: var(--accent); }

        .security-badge {
            margin-top: 20px;
            padding: 10px;
            background: var(--bg-input);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .security-badge span { margin: 0 5px; }

        .footer {
            text-align: center;
            padding: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="main-content">
            <div class="login-card">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
                <div class="login-icon">🐳</div>
                <h1>Docker Dashboard</h1>
                <p class="subtitle">Log in om toegang te krijgen</p>

                {% if error %}
                <div class="alert">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/login">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <input type="text" class="form-control" name="username" 
                               placeholder="Gebruikersnaam" required autofocus>
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" name="password" 
                               placeholder="Wachtwoord" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login">
                        🔐 Inloggen
                    </button>
                </form>

                <div class="security-badge">
                    <span>🔒 HTTPS</span>
                    <span>🛡️ CSRF Protected</span>
                    <span>⚡ Rate Limited</span>
                </div>
            </div>
        </div>
        <footer class="footer">
            Developed by JPHsystems &copy; 2026
        </footer>
    </div>

    <script>
        function initTheme() {
            const manualPref = localStorage.getItem('theme-manual');
            if (manualPref) {
                document.documentElement.setAttribute('data-theme', manualPref);
                updateThemeIcon(manualPref);
                return;
            }
            const hour = new Date().getHours();
            const autoTheme = (hour >= 19 || hour < 7) ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', autoTheme);
            updateThemeIcon(autoTheme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme-manual', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            document.querySelector('.theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        initTheme();
    </script>
</body>
</html>
