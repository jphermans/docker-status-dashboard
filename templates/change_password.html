<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wachtwoord Wijzigen - Docker Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 40px 20px; }
        .pwd-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 40px; max-width: 500px; margin: 0 auto; }
        h2 { color: #fff; text-align: center; margin-bottom: 30px; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; }
        .form-control:focus { background: rgba(255,255,255,0.2); border-color: #0d6efd; color: #fff; }
        .form-label { color: rgba(255,255,255,0.8); }
        .btn-primary { background: linear-gradient(45deg, #0d6efd, #0dcaf7); border: none; }
        .alert { border-radius: 10px; }
        .password-strength { height: 5px; border-radius: 5px; margin-top: 5px; transition: all 0.3s; }
        .strength-weak { background: #dc3545; width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: #198754; width: 100%; }
    </style>
</head>
<body>
    <div class="pwd-card">
        <h2>🔐 Wachtwoord Wijzigen</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" onsubmit="return validatePassword()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
                <label class="form-label">Huidig wachtwoord</label>
                <input type="password" name="current_password" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Nieuw wachtwoord</label>
                <input type="password" name="new_password" id="new_password" class="form-control" required minlength="8">
                <div class="password-strength" id="strength-bar"></div>
                <small class="text-muted">Minimaal 8 tekens</small>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Bevestig nieuw wachtwoord</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Wachtwoord Wijzigen</button>
                <a href="/" class="btn btn-outline-secondary">Annuleren</a>
            </div>
        </form>
    </div>
    
    <script>
        const newPwd = document.getElementById('new_password');
        const confirmPwd = document.getElementById('confirm_password');
        const strengthBar = document.getElementById('strength-bar');
        
        newPwd.addEventListener('input', function() {
            const val = this.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (val.match(/[A-Z]/)) strength++;
            if (val.match(/[0-9]/)) strength++;
            if (val.match(/[^A-Za-z0-9]/)) strength++;
            
            strengthBar.className = 'password-strength';
            if (strength <= 1) strengthBar.classList.add('strength-weak');
            else if (strength <= 2) strengthBar.classList.add('strength-medium');
            else strengthBar.classList.add('strength-strong');
        });
        
        function validatePassword() {
            if (newPwd.value !== confirmPwd.value) {
                alert('Wachtwoorden komen niet overeen!');
                return false;
            }
            if (newPwd.value.length < 8) {
                alert('Wachtwoord moet minimaal 8 tekens zijn!');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
