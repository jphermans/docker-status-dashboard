<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Status - Docker Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 40px 20px; }
        .status-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 40px; max-width: 500px; margin: 0 auto; }
        h2, h4 { color: #fff; }
        p { color: rgba(255,255,255,0.8); }
        .status-badge { display: inline-block; padding: 10px 25px; border-radius: 50px; font-weight: bold; margin: 20px 0; }
        .status-enabled { background: linear-gradient(45deg, #198754, #20c997); color: #fff; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; }
        .form-control:focus { background: rgba(255,255,255,0.2); border-color: #dc3545; color: #fff; }
        .btn-danger { background: linear-gradient(45deg, #dc3545, #fd7e14); border: none; }
        .btn-primary { background: linear-gradient(45deg, #0d6efd, #0dcaf7); border: none; }
    </style>
</head>
<body>
    <div class="status-card">
        <h2 style="text-align: center;">🔐 2FA Status</h2>
        
        {% if enabled %}
        <div style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 20px;">✅</div>
            <span class="status-badge status-enabled">ACTIEF</span>
            <p>Tweefactorauthenticatie is ingeschakeld voor je account.</p>
        </div>
        
        <hr style="border-color: rgba(255,255,255,0.2); margin: 30px 0;">
        
        <h4>2FA Uitschakelen</h4>
        <p style="font-size: 0.9rem; color: rgba(255,255,255,0.6);">Om 2FA uit te schakelen moet je je wachtwoord en huidige 2FA code invoeren.</p>
        
        <form method="POST" action="/2fa-disable">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Wachtwoord" required>
            </div>
            <div class="mb-3">
                <input type="text" name="totp_code" class="form-control" maxlength="6" placeholder="2FA Code" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-danger" onclick="return confirm('Weet je zeker dat je 2FA wilt uitschakelen?')">2FA Uitschakelen</button>
            </div>
        </form>
        {% endif %}
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="/" class="btn btn-primary">← Terug naar Dashboard</a>
        </div>
    </div>
</body>
</html>
