<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verificatie - Docker Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 40px; max-width: 400px; width: 100%; }
        .login-card h2 { color: #fff; margin-bottom: 30px; text-align: center; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; text-align: center; font-size: 2rem; letter-spacing: 10px; }
        .form-control:focus { background: rgba(255,255,255,0.2); border-color: #0d6efd; color: #fff; box-shadow: 0 0 0 0.25rem rgba(13,110,253,0.25); }
        .form-control::placeholder { color: rgba(255,255,255,0.5); letter-spacing: normal; font-size: 1rem; }
        .btn-primary { background: linear-gradient(45deg, #0d6efd, #0dcaf7); border: none; padding: 12px 40px; font-weight: 600; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(13,110,253,0.4); }
        .alert { border-radius: 10px; }
        .shield-icon { font-size: 4rem; text-align: center; margin-bottom: 20px; }
        .countdown { color: #ffc107; font-size: 0.9rem; text-align: center; margin-top: 10px; }
        .backup-hint { color: rgba(255,255,255,0.6); font-size: 0.85rem; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="shield-icon">🔐</div>
        <h2>Tweefactorauthenticatie</h2>
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        
        <p style="color: rgba(255,255,255,0.7); text-align: center; margin-bottom: 25px;">
            Voer de 6-cijferige code in uit je authenticator app
        </p>
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <input type="text" name="totp_code" class="form-control" 
                       maxlength="6" pattern="[0-9]{6}" placeholder="000000" 
                       autocomplete="one-time-code" inputmode="numeric" required autofocus>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Verifiëren</button>
            </div>
        </form>
        
        <div class="countdown" id="countdown">
            Code verloopt over: <span id="timer">--</span>s
        </div>
        
        <div class="backup-hint">
            Werkt je code niet? Gebruik een van je backup codes.
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="/logout" style="color: rgba(255,255,255,0.5); text-decoration: none;">← Terug naar login</a>
        </div>
    </div>
    
    <script>
        // Countdown timer for TOTP
        function updateTimer() {
            const now = new Date();
            const seconds = 30 - (now.getSeconds() % 30);
            document.getElementById('timer').textContent = seconds;
            
            if (seconds <= 5) {
                document.getElementById('timer').style.color = '#dc3545';
            } else {
                document.getElementById('timer').style.color = '#ffc107';
            }
        }
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
