<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Docker Status Dashboard - Monitor je containers">
    <meta name="theme-color" content="#fe8019">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DockerDash">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    
    <title>Docker Status Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #282828;
            --bg-card: #3c3836;
            --bg-header: #504945;
            --text-main: #ebdbb2;
            --text-muted: #a89984;
            --accent: #fe8019;
            --status-running: #b8bb26;
            --status-stopped: #fb4934;
            --table-row-bg: #3c3836;
            --table-row-hover: #504945;
        }
        
        [data-theme="light"] {
            --bg-main: #fbf1c7;
            --bg-card: #f2e5bc;
            --bg-header: #d5c4a1;
            --text-main: #3c3836;
            --text-muted: #665c54;
            --accent: #d65d0e;
            --status-running: #79740e;
            --status-stopped: #9d0006;
            --table-row-bg: #f2e5bc;
            --table-row-hover: #d5c4a1;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
        }
        
        .navbar {
            background-color: var(--bg-card);
            border-bottom: 2px solid var(--accent);
            padding: 0.75rem 1rem;
        }
        
        .navbar-brand { color: var(--accent) !important; font-weight: bold; }
        
        .nav-tabs {
            border-bottom: 1px solid var(--bg-header);
        }
        
        .nav-tabs .nav-link {
            color: var(--text-muted);
            border: none;
            padding: 0.75rem 1.5rem;
        }
        
        .nav-tabs .nav-link.active {
            color: var(--accent);
            background-color: var(--bg-card);
            border-bottom: 2px solid var(--accent);
        }
        
        .nav-tabs .nav-link:hover {
            color: var(--text-main);
        }
        
        .container-fluid { padding: 1rem; }
        
        .card {
            background-color: var(--bg-card);
            border: none;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .card-header {
            background-color: var(--bg-header);
            color: var(--text-main);
            font-weight: bold;
            border-radius: 8px 8px 0 0 !important;
        }
        
        .stat-card {
            text-align: center;
            padding: 1rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .table {
            color: var(--text-main);
            margin-bottom: 0;
        }
        
        .table thead th {
            background-color: var(--bg-header);
            color: var(--text-main);
            border: none;
            padding: 0.75rem;
        }
        
        .table tbody tr {
            background-color: var(--table-row-bg);
            cursor: pointer;
        }
        
        .table tbody tr:hover {
            background-color: var(--table-row-hover);
        }
        
        .table td {
            border: none;
            padding: 0.75rem;
            vertical-align: middle;
        }
        
        .status-running { color: var(--status-running); }
        .status-stopped { color: var(--status-stopped); }
        
        .btn-logout {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .btn-logout:hover {
            background-color: var(--accent);
            color: var(--bg-main);
        }
        
        .theme-toggle {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.4rem;
        }
        
        .logs-container {
            background-color: #1d2021;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #ebdbb2;
        }
        
        .container-selector {
            background-color: var(--bg-card);
            border: 1px solid var(--bg-header);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            margin-right: 0.5rem;
        }
        
        .btn-logs {
            background-color: var(--accent);
            border: none;
            color: var(--bg-main);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn-logs:hover {
            opacity: 0.9;
        }
        
        .auto-scroll-toggle {
            margin-left: 1rem;
            color: var(--text-main);
        }
        
        .last-update {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        @media (max-width: 768px) {
            .stat-value { font-size: 1.5rem; }
            .container-fluid { padding: 0.5rem; }
            .logs-container { height: 400px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="d-flex justify-content-between align-items-center w-100">
            <span class="navbar-brand">🐳 Docker Status Dashboard</span>
            <div class="d-flex align-items-center gap-2">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
                <a href="/logout" class="btn-logout">Logout</a>
            </div>
        </div>
    </nav>
    
    <ul class="nav nav-tabs" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="dashboard-tab" data-bs-toggle="tab" data-bs-target="#dashboard" type="button">📊 Dashboard</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="logs-tab" data-bs-toggle="tab" data-bs-target="#logs" type="button">📝 Logs</button>
        </li>
    </ul>
    
    <div class="tab-content" id="mainTabContent">
        <div class="tab-pane fade show active" id="dashboard" role="tabpanel">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-6 col-md-3">
                        <div class="card stat-card">
                            <div class="stat-value" id="cpu-stat">--</div>
                            <div class="stat-label">💻 CPU</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card">
                            <div class="stat-value" id="ram-stat">--</div>
                            <div class="stat-label">🧠 RAM</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card">
                            <div class="stat-value" id="disk-stat">--</div>
                            <div class="stat-label">💾 Disk</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card">
                            <div class="stat-value" id="uptime-stat" style="font-size: 1rem;">--</div>
                            <div class="stat-label">⏱️ Uptime</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>📦 Containers</span>
                        <span class="last-update" id="last-update">Last update: --</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table mb-0">
                                <thead>
                                    <tr>
                                        <th>Status</th>
                                        <th>Naam</th>
                                        <th>Image</th>
                                        <th>CPU</th>
                                        <th>Memory</th>
                                    </tr>
                                </thead>
                                <tbody id="containers-table">
                                    <tr><td colspan="5" class="text-center">Laden...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="tab-pane fade" id="logs" role="tabpanel">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-header">📝 Container Logs</div>
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <select class="container-selector" id="container-select">
                                <option value="">Selecteer container...</option>
                            </select>
                            <button class="btn-logs" onclick="loadLogs()">📝 Laad Logs</button>
                            <label class="auto-scroll-toggle">
                                <input type="checkbox" id="auto-scroll" checked>
                                Auto-scroll
                            </label>
                        </div>
                        <div class="logs-container" id="logs-output">Selecteer een container en klik op "Laad Logs"</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
                updateThemeIcon(saved);
            }
        }
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }
        
        function updateThemeIcon(theme) {
            document.querySelector('.theme-toggle').textContent = theme === 'light' ? '☀️' : '🌙';
        }
        
        initTheme();
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW registration failed:', err));
        }
        
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('cpu-stat').textContent = data.cpu + '%';
                document.getElementById('ram-stat').textContent = data.ram + '%';
                document.getElementById('disk-stat').textContent = data.disk + '%';
                document.getElementById('uptime-stat').textContent = data.uptime;
            } catch (e) {
                console.error('Error loading stats:', e);
            }
        }
        
        async function loadContainers() {
            try {
                const res = await fetch('/api/containers');
                const containers = await res.json();
                
                const select = document.getElementById('container-select');
                select.innerHTML = '<option value="">Selecteer container...</option>';
                containers.forEach(c => {
                    select.innerHTML += '<option value="' + c.name + '">' + c.name + '</option>';
                });
                
                const tbody = document.getElementById('containers-table');
                tbody.innerHTML = '';
                
                for (const c of containers) {
                    const statusClass = c.running ? 'status-running' : 'status-stopped';
                    const statusIcon = c.running ? '🟢' : '🔴';
                    
                    let cpu = '--', mem = '--';
                    try {
                        const statsRes = await fetch('/api/container/' + c.name + '/stats');
                        const stats = await statsRes.json();
                        cpu = stats.cpu;
                        mem = stats.memory;
                    } catch (e) {}
                    
                    tbody.innerHTML += '<tr onclick="viewLogs(\'' + c.name + '\')"><td><span class="' + statusClass + '">' + statusIcon + '</span></td><td>' + c.name + '</td><td>' + c.image + '</td><td>' + cpu + '</td><td>' + mem + '</td></tr>';
                }
                
                document.getElementById('last-update').textContent = 'Last update: ' + new Date().toLocaleTimeString('nl-NL');
            } catch (e) {
                console.error('Error loading containers:', e);
            }
        }
        
        function viewLogs(containerName) {
            document.getElementById('container-select').value = containerName;
            document.getElementById('logs-tab').click();
            loadLogs();
        }
        
        async function loadLogs() {
            const container = document.getElementById('container-select').value;
            if (!container) {
                alert('Selecteer eerst een container');
                return;
            }
            
            const logsOutput = document.getElementById('logs-output');
            logsOutput.textContent = 'Laden...';
            
            try {
                const res = await fetch('/api/container/' + container + '/logs?lines=200');
                const data = await res.json();
                logsOutput.textContent = data.logs || 'Geen logs beschikbaar';
                
                if (document.getElementById('auto-scroll').checked) {
                    logsOutput.scrollTop = logsOutput.scrollHeight;
                }
            } catch (e) {
                logsOutput.textContent = 'Fout bij laden logs: ' + e.message;
            }
        }
        
        loadStats();
        loadContainers();
        
        setInterval(function() {
            loadStats();
            loadContainers();
        }, 10000);
    </script>
</body>
</html>
